# ============================================================
# Discourse Docker Community
# Application binds ONLY to 10.0.1.204 — not publicly exposed.
# Cloudflare Tunnel proxies inbound traffic to this address.
# ============================================================

services:

  postgresql:
    image: bitnami/postgresql:16
    container_name: discourse-db
    restart: unless-stopped
    environment:
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-discourse}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-discourse}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - discourse-postgres-data:/bitnami/postgresql
    networks:
      - discourse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-discourse} -d ${POSTGRES_DB:-discourse}"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: discourse-redis
    restart: unless-stopped
    environment:
      # REDIS_PASSWORD is set here solely to make it available to the healthcheck
      # shell below; the redis image itself only reads the password from --requirepass.
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - discourse-redis-data:/data
    networks:
      - discourse-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5

  discourse:
    image: bitnami/discourse:3
    container_name: discourse-app
    restart: unless-stopped
    ports:
      - "10.0.1.204:${APP_PORT:-8090}:3000"
    environment:
      # Application identity
      DISCOURSE_HOST: ${DISCOURSE_HOSTNAME}
      DISCOURSE_SITE_NAME: ${DISCOURSE_SITE_NAME:-Community}
      DISCOURSE_DEVELOPER_EMAILS: ${DISCOURSE_DEVELOPER_EMAILS}
      # Initial admin account (bootstrap only — ignored after first run)
      DISCOURSE_ADMIN_USERNAME: ${DISCOURSE_ADMIN_USERNAME:-admin}
      DISCOURSE_ADMIN_EMAIL: ${DISCOURSE_ADMIN_EMAIL}
      DISCOURSE_ADMIN_PASSWORD: ${DISCOURSE_ADMIN_PASSWORD}
      # PostgreSQL connection
      DISCOURSE_DATABASE_HOST: postgresql
      DISCOURSE_DATABASE_PORT_NUMBER: "5432"
      DISCOURSE_DATABASE_USER: ${POSTGRES_USER:-discourse}
      DISCOURSE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DISCOURSE_DATABASE_NAME: ${POSTGRES_DB:-discourse}
      # Redis connection
      DISCOURSE_REDIS_HOST: redis
      DISCOURSE_REDIS_PORT_NUMBER: "6379"
      DISCOURSE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # SMTP — Brevo (DISCOURSE_SMTP_ENABLE_START_TLS=true maps to protocol=starttls)
      DISCOURSE_SMTP_HOST: ${DISCOURSE_SMTP_ADDRESS}
      DISCOURSE_SMTP_PORT_NUMBER: ${DISCOURSE_SMTP_PORT}
      DISCOURSE_SMTP_USER: ${DISCOURSE_SMTP_USER_NAME}
      DISCOURSE_SMTP_PASSWORD: ${DISCOURSE_SMTP_PASSWORD}
      DISCOURSE_SMTP_PROTOCOL: starttls
      # Timezone
      TZ: ${TIMEZONE:-Europe/Madrid}
    volumes:
      - discourse-app-data:/bitnami/discourse
    networks:
      - discourse-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ -o /dev/null || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  discourse-postgres-data:
    name: discourse-postgres-data
  discourse-redis-data:
    name: discourse-redis-data
  discourse-app-data:
    name: discourse-app-data

networks:
  discourse-network:
    driver: bridge
    name: discourse-network
